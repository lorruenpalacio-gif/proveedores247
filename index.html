<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proveedores — 24-7 Comunica</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111;color:#e5e5e5;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.75rem;background:#161616;border-bottom:1px solid #2a2a2a;position:sticky;top:0;z-index:10}
.header-left h1{font-size:20px;font-weight:600;color:#fff;display:flex;align-items:center;gap:8px}
.header-left h1 i{color:#D4A017}
.header-left p{font-size:13px;color:#888;margin-top:2px}
.btn-primary{background:#D4A017;color:#000;border:none;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary:hover{background:#c49014}
.toolbar{display:flex;align-items:center;gap:10px;padding:1rem 1.75rem;flex-wrap:wrap;background:#161616;border-bottom:1px solid #2a2a2a}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:340px}
.search-wrap input{width:100%;padding:8px 36px 8px 12px;border:1px solid #2a2a2a;border-radius:8px;font-size:13px;background:#1e1e1e;color:#e5e5e5;outline:none}
.search-wrap input:focus{border-color:#D4A017}
.search-wrap .si{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#666;font-size:16px;pointer-events:none}
.filter-group{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{padding:7px 12px;border:1px solid #2a2a2a;border-radius:8px;font-size:12px;cursor:pointer;background:#1e1e1e;color:#aaa;display:flex;align-items:center;gap:5px;white-space:nowrap}
.filter-btn.active{border-color:#D4A017;background:rgba(212,160,23,0.12);color:#D4A017;font-weight:600}
.filter-btn:hover:not(.active){background:#252525}
.sort-select{margin-left:auto;padding:7px 10px;border:1px solid #2a2a2a;border-radius:8px;font-size:12px;background:#1e1e1e;color:#aaa;cursor:pointer;outline:none}
.sort-select:focus{border-color:#D4A017}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px;padding:1.5rem 1.75rem}
.empty{grid-column:1/-1;text-align:center;padding:4rem;color:#555;font-size:14px}
.empty i{font-size:40px;display:block;margin-bottom:10px}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;overflow:hidden;transition:border-color 0.15s,transform 0.1s}
.card:hover{border-color:#3a3a3a;transform:translateY(-1px)}
.card-accent{height:3px;width:100%}
.card-body{padding:1rem 1rem 0.5rem}
.card-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;letter-spacing:0.5px}
.card-title{font-size:14px;font-weight:600;color:#fff;line-height:1.3;margin-bottom:2px}
.card-rubro{font-size:11px;color:#888;line-height:1.4}
.badge{margin-left:auto;flex-shrink:0;padding:4px 8px;border-radius:20px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:4px;white-space:nowrap}
.badge-activo{background:rgba(34,197,94,0.12);color:#4ade80}
.badge-inactivo{background:rgba(239,68,68,0.12);color:#f87171}
.badge-fav{background:rgba(212,160,23,0.12);color:#D4A017;border:1px solid rgba(212,160,23,0.25)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 10px;padding-bottom:10px;border-bottom:1px solid #252525}
.info-row{display:flex;flex-direction:column;gap:2px}
.info-lbl{color:#666;font-size:10px;display:flex;align-items:center;gap:3px;text-transform:uppercase;letter-spacing:0.4px}
.info-lbl i{font-size:11px}
.info-val{color:#ddd;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 10px;padding:8px 0 4px}
.card-actions{display:flex;gap:6px;padding:8px 1rem 10px;border-top:1px solid #252525;flex-wrap:wrap}
.act-btn{padding:6px 10px;border:1px solid #2a2a2a;border-radius:7px;font-size:11px;cursor:pointer;background:transparent;color:#aaa;display:flex;align-items:center;gap:4px;flex:1;justify-content:center;min-width:70px;white-space:nowrap;transition:all 0.15s}
.act-btn:hover{background:#252525;color:#fff;border-color:#3a3a3a}
.act-btn.fav-btn{color:#D4A017;border-color:rgba(212,160,23,0.3)}
.act-btn.fav-btn:hover{background:rgba(212,160,23,0.1)}
.act-btn.del-btn{color:#f87171;border-color:rgba(239,68,68,0.25)}
.act-btn.del-btn:hover{background:rgba(239,68,68,0.1)}
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;padding:0.75rem 1.75rem 2rem}
.pg-btn{width:34px;height:34px;border:1px solid #2a2a2a;border-radius:7px;font-size:13px;cursor:pointer;background:#1e1e1e;color:#aaa;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.pg-btn.active{background:#D4A017;color:#000;border-color:#D4A017;font-weight:700}
.pg-btn:hover:not(.active){background:#252525;border-color:#3a3a3a;color:#fff}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:#1e1e1e;border-radius:14px;width:100%;max-width:520px;border:1px solid #333;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.25rem;border-bottom:1px solid #2a2a2a;position:sticky;top:0;background:#1e1e1e;z-index:1}
.modal-header h2{font-size:16px;font-weight:600;color:#fff}
.modal-close{background:none;border:none;cursor:pointer;color:#666;font-size:22px;padding:0;line-height:1;display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px}
.modal-close:hover{background:#2a2a2a;color:#fff}
.modal-body{padding:1.25rem;display:flex;flex-direction:column;gap:12px}
.section-label{font-size:11px;font-weight:600;color:#D4A017;text-transform:uppercase;letter-spacing:0.6px;margin-top:4px;padding-bottom:6px;border-bottom:1px solid #2a2a2a}
.field-group{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
.field label{font-size:12px;color:#999;font-weight:500}
.field input,.field select,.field textarea{padding:8px 10px;border:1px solid #2a2a2a;border-radius:8px;font-size:13px;background:#161616;color:#e5e5e5;outline:none;width:100%;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#D4A017}
.field textarea{resize:vertical;min-height:56px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:1rem 1.25rem;border-top:1px solid #2a2a2a;position:sticky;bottom:0;background:#1e1e1e}
.btn-cancel{padding:8px 16px;border:1px solid #2a2a2a;border-radius:8px;font-size:13px;cursor:pointer;background:transparent;color:#aaa}
.btn-cancel:hover{background:#252525;color:#fff}
.btn-save{padding:8px 16px;border:none;border-radius:8px;font-size:13px;cursor:pointer;background:#D4A017;color:#000;font-weight:700;display:flex;align-items:center;gap:6px}
.btn-save:hover{background:#c49014}
.btn-save:disabled{opacity:0.5;cursor:not-allowed}
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1100;align-items:center;justify-content:center;padding:1rem}
.confirm-overlay.open{display:flex}
.confirm-box{background:#1e1e1e;border:1px solid #333;border-radius:12px;padding:1.5rem;max-width:340px;width:100%;text-align:center}
.confirm-box h3{font-size:16px;color:#fff;margin-bottom:8px}
.confirm-box p{font-size:13px;color:#888;margin-bottom:1.25rem;line-height:1.5}
.confirm-actions{display:flex;gap:8px;justify-content:center}
.btn-confirm-del{padding:8px 20px;border:none;border-radius:8px;font-size:13px;cursor:pointer;background:#ef4444;color:#fff;font-weight:600}
.btn-confirm-del:hover{background:#dc2626}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1e1e1e;border:1px solid #333;border-radius:8px;padding:10px 14px;font-size:13px;color:#e5e5e5;z-index:2000;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,0.5);transform:translateY(80px);opacity:0;transition:all 0.22s cubic-bezier(.4,0,.2,1);pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.loading{grid-column:1/-1;text-align:center;padding:4rem;color:#555;font-size:14px;display:flex;align-items:center;justify-content:center;gap:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid #333;border-top-color:#D4A017;border-radius:50%;animation:spin 0.7s linear infinite}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1><i class="ti ti-building"></i>Proveedores</h1>
    <p>Listado de proveedores y cuentas bancarias</p>
  </div>
  <button class="btn-primary" onclick="openModal()"><i class="ti ti-plus"></i>Nuevo proveedor</button>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Buscar proveedor..." oninput="render()">
    <i class="ti ti-search si"></i>
  </div>
  <div class="filter-group">
    <button class="filter-btn active" onclick="setFilter('Todos',this)"><i class="ti ti-layout-grid" style="font-size:13px"></i>Todos</button>
    <button class="filter-btn" onclick="setFilter('Banco General',this)">Banco General</button>
    <button class="filter-btn" onclick="setFilter('BAC',this)">BAC</button>
    <button class="filter-btn" onclick="setFilter('Banistmo',this)">Banistmo</button>
    <button class="filter-btn" onclick="setFilter('Scotiabank',this)">Scotiabank</button>
    <button class="filter-btn" onclick="setFilter('Lafise',this)">Lafise</button>
  </div>
  <select class="sort-select" id="sort" onchange="render()">
    <option value="az">Nombre A-Z</option>
    <option value="za">Nombre Z-A</option>
    <option value="fav">Favoritos primero</option>
    <option value="reciente">Más recientes</option>
  </select>
</div>

<div class="grid" id="grid"><div class="loading"><div class="spinner"></div>Cargando proveedores...</div></div>
<div class="pagination" id="pagination"></div>

<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Nuevo proveedor</h2>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="section-label">Información de la empresa</div>
      <div class="field-group">
        <div class="field full"><label>Nombre de la empresa *</label><input type="text" id="f-nombre" placeholder="Empresa S.A."></div>
        <div class="field full"><label>A qué se dedica (rubro)</label><input type="text" id="f-rubro" placeholder="Distribución de alimentos, tecnología, etc."></div>
        <div class="field"><label>RUC</label><input type="text" id="f-ruc" placeholder="0000000-1-000000"></div>
        <div class="field"><label>Estado</label><select id="f-estado"><option>Activo</option><option>Inactivo</option></select></div>
      </div>
      <div class="section-label">Datos bancarios</div>
      <div class="field-group">
        <div class="field"><label>Banco</label><select id="f-banco"><option>Banco General</option><option>BAC</option><option>Banistmo</option><option>Scotiabank</option><option>Lafise</option><option>Multibank</option><option>Global Bank</option><option>Otro</option></select></div>
        <div class="field"><label>Tipo de cuenta</label><select id="f-tipo"><option>Cuenta Corriente</option><option>Cuenta de Ahorros</option></select></div>
        <div class="field"><label>Número de cuenta</label><input type="text" id="f-cuenta" placeholder="00-00-00-000000-0"></div>
        <div class="field"><label>Moneda</label><select id="f-moneda"><option>USD</option><option>PAB</option></select></div>
      </div>
      <div class="section-label">Contacto</div>
      <div class="field-group">
        <div class="field"><label>Nombre del contacto</label><input type="text" id="f-contacto" placeholder="Juan Pérez"></div>
        <div class="field"><label>Teléfono</label><input type="text" id="f-tel" placeholder="+507 6000-0000"></div>
        <div class="field full"><label>Correo electrónico</label><input type="text" id="f-email" placeholder="pagos@empresa.com"></div>
        <div class="field full"><label>Notas adicionales</label><textarea id="f-notas" placeholder="Condiciones de pago, observaciones, etc."></textarea></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="btn-save" onclick="saveProveedor()"><i class="ti ti-check" style="font-size:14px"></i>Guardar proveedor</button>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirm" onclick="closeConfirm(event)">
  <div class="confirm-box">
    <h3>Eliminar proveedor</h3>
    <p id="confirm-msg">¿Estás seguro?</p>
    <div class="confirm-actions">
      <button class="btn-cancel" onclick="closeConfirm()">Cancelar</button>
      <button class="btn-confirm-del" onclick="confirmDelete()">Eliminar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SURL = 'https://dnoanewokuudilujterx.supabase.co/rest/v1/proveedores';
var SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRub2FuZXdva3V1ZGlsdWp0ZXJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjY1NTgsImV4cCI6MjA4OTgwMjU1OH0.DjB9eFHQqy2a3WruL8kZ0ShVnwOWfPbb6B5LE3NvVdE';

function getHeaders(extra) {
  var h = {
    'Content-Type': 'application/json',
    'apikey': SKEY,
    'Authorization': 'Bearer ' + SKEY
  };
  if (extra) { Object.keys(extra).forEach(function(k){ h[k] = extra[k]; }); }
  return h;
}

async function dbGet() {
  var r = await fetch(SURL + '?order=created_at.desc&select=*', { headers: getHeaders() });
  return r.json();
}
async function dbInsert(data) {
  var r = await fetch(SURL + '?select=*', {
    method: 'POST',
    headers: getHeaders({ 'Prefer': 'return=representation' }),
    body: JSON.stringify(data)
  });
  if (!r.ok) { var e = await r.text(); throw new Error(e); }
  return r.json();
}
async function dbUpdate(id, data) {
  var r = await fetch(SURL + '?id=eq.' + id, {
    method: 'PATCH',
    headers: getHeaders({ 'Prefer': 'return=minimal' }),
    body: JSON.stringify(data)
  });
  if (!r.ok) { var e = await r.text(); throw new Error(e); }
}
async function dbDelete(id) {
  var r = await fetch(SURL + '?id=eq.' + id, {
    method: 'DELETE',
    headers: getHeaders({ 'Prefer': 'return=minimal' })
  });
  if (!r.ok) { var e = await r.text(); throw new Error(e); }
}

var BANK_COLORS = {'Banco General':'#0052CC','BAC':'#E8261A','Banistmo':'#F5A623','Scotiabank':'#EC111A','Lafise':'#1B6CA8','Multibank':'#006F3C','Global Bank':'#7B3FA0','Otro':'#555'};
var AVATAR_COLORS = [['#1e3a5f','#60a5fa'],['#1e3a2f','#4ade80'],['#3b1e1e','#f87171'],['#3b2e0a','#fbbf24'],['#2d1e3b','#a78bfa'],['#1e3535','#2dd4bf']];

function getAvatar(name) { var i = (name.charCodeAt(0) + (name.charCodeAt(1)||0)) % AVATAR_COLORS.length; return AVATAR_COLORS[i]; }
function initials(name) { return name.split(/[\s,\.]+/).filter(Boolean).slice(0,2).map(function(w){return w[0];}).join('').toUpperCase(); }

var proveedores = [];
var activeFilter = 'Todos';
var editId = null;
var deleteId = null;
var PER_PAGE = 6;
var page = 1;

async function loadProveedores() {
  try {
    proveedores = await dbGet();
    render();
  } catch(e) {
    document.getElementById('grid').innerHTML = '<div class="empty"><i class="ti ti-wifi-off"></i>Error al cargar datos.</div>';
  }
}

function setFilter(bank, btn) {
  activeFilter = bank;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  page = 1;
  render();
}

function filtered() {
  var q = document.getElementById('search').value.toLowerCase();
  var sort = document.getElementById('sort').value;
  var list = proveedores.filter(function(p) {
    var matchBank = activeFilter === 'Todos' || p.banco === activeFilter;
    var matchQ = !q || [p.nombre,p.rubro,p.contacto,p.banco,p.ruc,p.email].some(function(v){ return (v||'').toLowerCase().includes(q); });
    return matchBank && matchQ;
  });
  if (sort==='az') list.sort(function(a,b){ return a.nombre.localeCompare(b.nombre); });
  else if (sort==='za') list.sort(function(a,b){ return b.nombre.localeCompare(a.nombre); });
  else if (sort==='fav') list.sort(function(a,b){ return b.fav-a.fav || a.nombre.localeCompare(b.nombre); });
  else if (sort==='reciente') list.sort(function(a,b){ return new Date(b.created_at)-new Date(a.created_at); });
  return list;
}

function render() {
  var list = filtered();
  var total = Math.max(1, Math.ceil(list.length / PER_PAGE));
  if (page > total) page = total;
  var slice = list.slice((page-1)*PER_PAGE, page*PER_PAGE);
  var g = document.getElementById('grid');
  if (!slice.length) {
    g.innerHTML = '<div class="empty"><i class="ti ti-search-off"></i>Sin resultados</div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  g.innerHTML = slice.map(function(p) {
    var av = getAvatar(p.nombre);
    var abg = av[0]; var afg = av[1];
    var accent = BANK_COLORS[p.banco] || '#555';
    var est = (p.estado || 'Activo').toLowerCase();
    var favBadge = p.fav
      ? '<span class="badge badge-fav"><i class="ti ti-star-filled" style="font-size:10px"></i>Favorito</span>'
      : '<span class="badge badge-' + est + '"><i class="ti ti-circle-filled" style="font-size:8px"></i>' + (p.estado||'Activo') + '</span>';
    var notasHtml = p.notas ? '<div class="info-row" style="grid-column:1/-1"><span class="info-lbl"><i class="ti ti-notes"></i>Notas</span><span class="info-val" style="white-space:normal;font-size:11px;color:#aaa">' + p.notas + '</span></div>' : '';
    return '<div class="card">'
      + '<div class="card-accent" style="background:' + accent + '"></div>'
      + '<div class="card-body">'
      + '<div class="card-head">'
      + '<div class="avatar" style="background:' + abg + ';color:' + afg + '">' + initials(p.nombre) + '</div>'
      + '<div style="min-width:0;flex:1"><div class="card-title">' + p.nombre + '</div><div class="card-rubro">' + (p.rubro||'Sin rubro') + '</div></div>'
      + favBadge + '</div>'
      + '<div class="info-grid">'
      + '<div class="info-row"><span class="info-lbl"><i class="ti ti-building-bank"></i>Banco</span><span class="info-val">' + (p.banco||'—') + '</span></div>'
      + '<div class="info-row"><span class="info-lbl"><i class="ti ti-credit-card"></i>Tipo</span><span class="info-val">' + (p.tipo||'—') + '</span></div>'
      + '<div class="info-row" style="grid-column:1/-1"><span class="info-lbl"><i class="ti ti-hash"></i>Número de cuenta</span><span class="info-val">' + (p.cuenta||'—') + '</span></div>'
      + '<div class="info-row"><span class="info-lbl"><i class="ti ti-currency-dollar"></i>Moneda</span><span class="info-val">' + (p.moneda||'USD') + '</span></div>'
      + '<div class="info-row"><span class="info-lbl"><i class="ti ti-id"></i>RUC</span><span class="info-val">' + (p.ruc||'—') + '</span></div>'
      + '</div>'
      + '<div class="contact-grid">'
      + '<div class="info-row"><span class="info-lbl"><i class="ti ti-user"></i>Contacto</span><span class="info-val">' + (p.contacto||'—') + '</span></div>'
      + '<div class="info-row"><span class="info-lbl"><i class="ti ti-phone"></i>Teléfono</span><span class="info-val">' + (p.tel||'—') + '</span></div>'
      + '<div class="info-row" style="grid-column:1/-1"><span class="info-lbl"><i class="ti ti-mail"></i>Correo</span><span class="info-val" style="font-size:11px">' + (p.email||'—') + '</span></div>'
      + notasHtml
      + '</div></div>'
      + '<div class="card-actions">'
      + '<button class="act-btn" onclick="copyBankData(' + p.id + ')"><i class="ti ti-copy" style="font-size:13px"></i>Copiar datos</button>'
      + '<button class="act-btn" onclick="openEdit(' + p.id + ')"><i class="ti ti-edit" style="font-size:13px"></i>Editar</button>'
      + '<button class="act-btn fav-btn" onclick="toggleFav(' + p.id + ',' + (p.fav?'true':'false') + ')"><i class="ti ti-star' + (p.fav?'-filled':'') + '" style="font-size:13px"></i>' + (p.fav?'Quitar':'Favorito') + '</button>'
      + '<button class="act-btn del-btn" onclick="askDelete(' + p.id + ')"><i class="ti ti-trash" style="font-size:13px"></i></button>'
      + '</div></div>';
  }).join('');
  renderPagination(total);
}

function renderPagination(total) {
  var pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }
  var btns = '';
  if (page > 1) btns += '<button class="pg-btn" onclick="goPage(' + (page-1) + ')"><i class="ti ti-chevron-left" style="font-size:14px"></i></button>';
  for (var i=1; i<=total; i++) {
    if (i===1||i===total||Math.abs(i-page)<=1) btns += '<button class="pg-btn' + (i===page?' active':'') + '" onclick="goPage(' + i + ')">' + i + '</button>';
    else if (Math.abs(i-page)===2) btns += '<span style="color:#555;padding:0 4px;align-self:center">…</span>';
  }
  if (page < total) btns += '<button class="pg-btn" onclick="goPage(' + (page+1) + ')"><i class="ti ti-chevron-right" style="font-size:14px"></i></button>';
  pg.innerHTML = btns;
}

function goPage(p) { page = p; render(); window.scrollTo({top:0,behavior:'smooth'}); }

async function toggleFav(id, current) {
  try {
    await dbUpdate(id, {fav: !current});
    var p = proveedores.find(function(x){ return x.id===id; });
    p.fav = !current;
    render();
    showToast(!current ? '⭐ Marcado como favorito' : 'Favorito eliminado');
  } catch(e) { showToast('Error al actualizar'); }
}

function copyBankData(id) {
  var p = proveedores.find(function(x){ return x.id===id; });
  var txt = 'Beneficiario: ' + p.nombre + '\nBanco: ' + p.banco + '\nTipo de cuenta: ' + p.tipo + '\nNúmero de cuenta: ' + p.cuenta + '\nMoneda: ' + p.moneda + '\nRUC: ' + p.ruc;
  navigator.clipboard.writeText(txt).then(function(){ showToast('Datos bancarios copiados'); }).catch(function(){ showToast('No se pudo copiar'); });
}

function askDelete(id) {
  deleteId = id;
  var p = proveedores.find(function(x){ return x.id===id; });
  document.getElementById('confirm-msg').textContent = 'Eliminar a "' + p.nombre + '"? Esta acción no se puede deshacer.';
  document.getElementById('confirm').classList.add('open');
}
function closeConfirm(e) {
  if (!e || e.target===document.getElementById('confirm')) {
    document.getElementById('confirm').classList.remove('open');
    deleteId = null;
  }
}
async function confirmDelete() {
  try {
    await dbDelete(deleteId);
    proveedores = proveedores.filter(function(x){ return x.id !== deleteId; });
    render();
    showToast('Proveedor eliminado');
  } catch(e) { showToast('Error al eliminar'); }
  document.getElementById('confirm').classList.remove('open');
  deleteId = null;
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.innerHTML = '<i class="ti ti-check" style="font-size:16px;color:#4ade80"></i>' + msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.classList.remove('show'); }, 2600);
}

function clearForm() {
  ['nombre','rubro','cuenta','contacto','tel','email','ruc','notas'].forEach(function(f){ document.getElementById('f-'+f).value=''; });
  document.getElementById('f-banco').value = 'Banco General';
  document.getElementById('f-tipo').value = 'Cuenta Corriente';
  document.getElementById('f-moneda').value = 'USD';
  document.getElementById('f-estado').value = 'Activo';
}

function openModal() {
  editId = null;
  document.getElementById('modal-title').textContent = 'Nuevo proveedor';
  clearForm();
  document.getElementById('modal').classList.add('open');
  setTimeout(function(){ document.getElementById('f-nombre').focus(); }, 100);
}

function openEdit(id) {
  editId = id;
  var p = proveedores.find(function(x){ return x.id===id; });
  document.getElementById('modal-title').textContent = 'Editar proveedor';
  document.getElementById('f-nombre').value = p.nombre||'';
  document.getElementById('f-rubro').value = p.rubro||'';
  document.getElementById('f-banco').value = p.banco||'Banco General';
  document.getElementById('f-tipo').value = p.tipo||'Cuenta Corriente';
  document.getElementById('f-cuenta').value = p.cuenta||'';
  document.getElementById('f-moneda').value = p.moneda||'USD';
  document.getElementById('f-contacto').value = p.contacto||'';
  document.getElementById('f-tel').value = p.tel||'';
  document.getElementById('f-email').value = p.email||'';
  document.getElementById('f-ruc').value = p.ruc||'';
  document.getElementById('f-estado').value = p.estado||'Activo';
  document.getElementById('f-notas').value = p.notas||'';
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target===document.getElementById('modal')) closeModal(); }

async function saveProveedor() {
  var nombre = document.getElementById('f-nombre').value.trim();
  if (!nombre) { document.getElementById('f-nombre').focus(); showToast('El nombre es obligatorio'); return; }
  var data = {
    nombre: nombre,
    rubro: document.getElementById('f-rubro').value.trim(),
    banco: document.getElementById('f-banco').value,
    tipo: document.getElementById('f-tipo').value,
    cuenta: document.getElementById('f-cuenta').value.trim(),
    moneda: document.getElementById('f-moneda').value,
    contacto: document.getElementById('f-contacto').value.trim(),
    tel: document.getElementById('f-tel').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    ruc: document.getElementById('f-ruc').value.trim(),
    estado: document.getElementById('f-estado').value,
    notas: document.getElementById('f-notas').value.trim()
  };
  var btn = document.getElementById('btn-save');
  btn.disabled = true;
  try {
    if (editId) {
      await dbUpdate(editId, data);
      var idx = proveedores.findIndex(function(x){ return x.id===editId; });
      proveedores[idx] = Object.assign({}, proveedores[idx], data);
      showToast('Proveedor actualizado');
    } else {
      var result = await dbInsert(data);
      proveedores.unshift(result[0]);
      showToast('Proveedor guardado');
    }
    closeModal();
    page = 1;
    render();
  } catch(e) {
    console.error(e);
    showToast('Error al guardar: ' + e.message);
  }
  btn.disabled = false;
}

document.addEventListener('keydown', function(e){ if(e.key==='Escape'){ closeModal(); closeConfirm(); } });
loadProveedores();
</script>
